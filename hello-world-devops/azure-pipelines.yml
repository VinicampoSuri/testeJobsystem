trigger:
- main

variables:
- group: deployment-secrets
- name: ACR_NAME
  value: 'jobsystem.azurecr.io'
- name: IMAGE_TAG
  value: '$(Build.BuildId)'

stages:
# ============================================
# STAGE 1: BUILD E PUSH PARA O ACR
# ============================================
- stage: BuildAndTest
  displayName: Build and Push to ACR

  jobs:
  # ===== BUILD BACKEND =====
  - job: BuildBackend
    displayName: Build Backend
    pool:
      name: Jobsystem-Agent
      demands:
      - Agent.Name -equals Backend
    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build & Push Backend to ACR
      inputs:
        command: buildAndPush
        containerRegistry: 'acr-jobsystem'
        repository: 'pipeline-backend-prod'
        dockerfile: './hello-world-devops/backend/Dockerfile'
        tags: |
          $(IMAGE_TAG)
          latest

    - script: |
        echo "✅ Backend pushed to ACR!"
        echo "📦 Image: $(ACR_NAME)/pipeline-backend-prod:$(IMAGE_TAG)"
      displayName: Verify Backend Push

  # ===== BUILD FRONTEND =====
  - job: BuildFrontend
    displayName: Build Frontend
    pool:
      name: Jobsystem-Agent
      demands:
      - Agent.Name -equals Frontend
    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build & Push Frontend to ACR
      inputs:
        command: buildAndPush
        containerRegistry: 'acr-jobsystem'
        repository: 'pipeline-frontend-prod'
        dockerfile: './hello-world-devops/frontend/Dockerfile'
        tags: |
          $(IMAGE_TAG)
          latest

    - script: |
        echo "✅ Frontend pushed to ACR!"
        echo "📦 Image: $(ACR_NAME)/pipeline-frontend-prod:$(IMAGE_TAG)"
      displayName: Verify Frontend Push

# ============================================
# STAGE 2: DEPLOY EM PRODUÇÃO
# ============================================
- stage: Deploy
  displayName: Deploy to Production
  dependsOn: BuildAndTest
  condition: succeeded()

  jobs:
  # ===== DEPLOY BACKEND =====
  - job: DeployBackend
    displayName: Deploy Backend
    pool:
      name: Jobsystem-Agent
      demands:
      - Agent.Name -equals Backend
    steps:

    - task: Docker@2
      displayName: ACR Login
      inputs:
        command: login
        containerRegistry: 'acr-jobsystem'

    - script: |
        echo "🧹 Stopping old backend container..."
        docker rm -f backend-prod || true

        echo "🚀 Pulling image from ACR..."
        docker pull $(ACR_NAME)/pipeline-backend-prod:$(IMAGE_TAG)

        echo "🚀 Starting backend in production..."
        docker run -d \
          --name backend-prod \
          --restart unless-stopped \
          -p 5000:5000 \
          -e DB_HOST=$(DB_HOST) \
          -e DB_USER=$(DB_USER) \
          -e DB_PASSWORD=$(DB_PASSWORD) \
          -e DB_NAME=$(DB_NAME) \
          -e ENVIRONMENT=production \
          $(ACR_NAME)/pipeline-backend-prod:$(IMAGE_TAG)

        echo "⏳ Waiting for backend to start..."
        sleep 15

        echo "✅ Testing backend health..."
        curl -f http://localhost:5000/health || exit 1

        echo "🎉 Backend deployed successfully!"
      displayName: Deploy Backend Container

    - script: |
        echo "📊 Backend Status:"
        docker ps | grep backend-prod
        echo ""
        echo "📋 Backend Logs:"
        docker logs --tail 20 backend-prod
        echo ""
        echo "🌐 Backend URL: http://$(BACKEND_IP):5000"
      displayName: Show Backend Status

  # ===== DEPLOY FRONTEND =====
  - job: DeployFrontend
    displayName: Deploy Frontend
    dependsOn: DeployBackend
    pool:
      name: Jobsystem-Agent
      demands:
      - Agent.Name -equals Frontend
    steps:

    - checkout: self

    - task: Docker@2
      displayName: ACR Login
      inputs:
        command: login
        containerRegistry: 'acr-jobsystem'

    - script: |
        echo "⚙️ Configuring backend IP..."
        BACKEND_IP="$(BACKEND_IP)"
        sed -i "s/server backend:5000;/server $BACKEND_IP:5000;/g" ./hello-world-devops/frontend/nginx.conf

        echo "🔨 Rebuilding frontend with backend IP..."
        docker build -t $(ACR_NAME)/pipeline-frontend-prod:$(IMAGE_TAG) \
          ./hello-world-devops/frontend

        echo "📤 Pushing rebuilt frontend to ACR..."
        docker push $(ACR_NAME)/pipeline-frontend-prod:$(IMAGE_TAG)
      displayName: Configure, Rebuild and Push Frontend

    - script: |
        echo "🧹 Stopping old frontend container..."
        docker rm -f frontend-prod || true

        echo "🚀 Pulling image from ACR..."
        docker pull $(ACR_NAME)/pipeline-frontend-prod:$(IMAGE_TAG)

        echo "🚀 Starting frontend in production..."
        docker run -d \
          --name frontend-prod \
          --restart unless-stopped \
          -p 80:80 \
          $(ACR_NAME)/pipeline-frontend-prod:$(IMAGE_TAG)

        echo "⏳ Waiting for frontend to start..."
        sleep 10

        curl -f http://localhost || exit 1
        curl -f http://localhost/api/health || exit 1

        echo "🎉 Frontend deployed successfully!"
      displayName: Deploy Frontend Container

    - script: |
        echo "📊 Frontend Status:"
        docker ps | grep frontend-prod
        echo ""
        echo "📋 Frontend Logs:"
        docker logs --tail 20 frontend-prod
        echo ""
        echo "🌐 Frontend URL: http://$(FRONTEND_IP)"
        echo "🔗 API Proxy: http://$(FRONTEND_IP)/api/health"
      displayName: Show Frontend Status

# ============================================
# STAGE 3: VERIFICAÇÃO FINAL
# ============================================
- stage: VerifyDeployment
  displayName: Verify Production Deployment
  dependsOn: Deploy
  condition: succeeded()

  jobs:
  - job: VerifyFromFrontend
    displayName: End-to-End Test
    pool:
      name: Jobsystem-Agent
      demands:
      - Agent.Name -equals Frontend
    steps:

    - script: |
        echo "🔍 Running end-to-end tests..."

        echo "✅ Test 1: Frontend page"
        curl -f http://localhost || exit 1

        echo "✅ Test 2: Backend health via proxy"
        curl -f http://localhost/api/health || exit 1

        echo "✅ Test 3: Backend hello endpoint"
        curl -f http://localhost/api/hello || exit 1

        echo "✅ Test 4: Database connection"
        curl -f http://localhost/api/db-test || echo "⚠️ Database test failed (non-blocking)"

        echo "🎉 All critical tests passed!"
      displayName: Run End-to-End Tests

    - script: |
        echo "============================================"
        echo "🎉 DEPLOYMENT COMPLETE!"
        echo "============================================"
        echo ""
        echo "📍 Access Points:"
        echo "  Frontend:  http://$(FRONTEND_IP)"
        echo "  Backend:   http://$(BACKEND_IP):5000"
        echo ""
        echo "🔗 API Endpoints (via proxy):"
        echo "  Health:    http://$(FRONTEND_IP)/api/health"
        echo "  Hello:     http://$(FRONTEND_IP)/api/hello"
        echo "  DB Test:   http://$(FRONTEND_IP)/api/db-test"
        echo ""
        echo "✅ Deployment successful!"
        echo "============================================"
      displayName: Show Deployment Summary