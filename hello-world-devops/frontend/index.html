<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Test - Frontend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .status {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }
        .status strong {
            color: #27ae60;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        #result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .loading {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }
        pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 10px;
        }
        .emoji {
            font-size: 1.5em;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 DevOps Pipeline Test</h1>
        <p class="subtitle">Frontend + Backend Integration</p>
        
        <div class="status">
            <strong>Frontend Status:</strong> ✅ Running on Nginx + Docker
        </div>
        
        <button onclick="testBackend()">
            <span class="emoji">🔗</span> Testar Backend
        </button>
        <button onclick="testHealth()">
            <span class="emoji">💚</span> Health Check
        </button>
        <button onclick="testDatabase()">
            <span class="emoji">🗄️</span> Testar Database
        </button>
        
        <div id="result"></div>
    </div>

    <script>
        async function showResult(className, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = className;
            resultDiv.innerHTML = message;
        }

        async function testBackend() {
            showResult('loading', '<span class="emoji">⏳</span> Testando conexão com backend...');
            
            try {
                const response = await fetch('/api/hello');
                const data = await response.json();
                
                showResult('success', `
                    <span class="emoji">✅</span> <strong>Backend respondeu com sucesso!</strong>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `);
            } catch (error) {
                showResult('error', `
                    <span class="emoji">❌</span> <strong>Erro ao conectar no backend</strong>
                    <p>Detalhes: ${error.message}</p>
                `);
            }
        }

        async function testHealth() {
            showResult('loading', '<span class="emoji">⏳</span> Verificando saúde do sistema...');
            
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                
                showResult('success', `
                    <span class="emoji">💚</span> <strong>Sistema saudável!</strong>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `);
            } catch (error) {
                showResult('error', `
                    <span class="emoji">❌</span> <strong>Health check falhou</strong>
                    <p>Detalhes: ${error.message}</p>
                `);
            }
        }

        async function testDatabase() {
            showResult('loading', '<span class="emoji">⏳</span> Testando conexão com banco de dados...');
            
            try {
                const response = await fetch('/api/db-test');
                const data = await response.json();
                
                if (data.status === 'success') {
                    showResult('success', `
                        <span class="emoji">✅</span> <strong>Conexão com banco OK!</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `);
                } else {
                    showResult('error', `
                        <span class="emoji">⚠️</span> <strong>Banco de dados com problemas</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `);
                }
            } catch (error) {
                showResult('error', `
                    <span class="emoji">❌</span> <strong>Erro ao testar banco de dados</strong>
                    <p>Detalhes: ${error.message}</p>
                `);
            }
        }
    </script>
</body>
</html>
